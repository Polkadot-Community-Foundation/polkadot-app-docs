# Polkadot App Docs — MkDocs Material configuration.
# The visual identity is fully contained in material-overrides/assets/stylesheets/
# (theme.css + fonts.css) and the two palette schemes below. Revamping the look
# means editing those files — content pages stay untouched plain Markdown.

site_name: Polkadot App Docs
site_description: >-
  Developer and user documentation for the Polkadot Products Devnet and the
  Polkadot app — architecture, guides, and reference.
site_url: https://docs.polkadotcommunity.foundation/
copyright: © Polkadot Community Foundation
docs_dir: docs

# Repo edit links (adjust once the repo is pushed).
repo_url: https://github.com/Polkadot-Community-Foundation/polkadot-app-docs
repo_name: polkadot-app-docs
edit_uri: edit/main/docs/

extra_css:
  - assets/stylesheets/fonts.css
  - assets/stylesheets/theme.css

# Click-to-zoom lightbox for the Mermaid diagrams (self-contained, no CDN).
extra_javascript:
  - assets/javascripts/mermaid-zoom.js

validation:
  absolute_links: ignore
  unrecognized_links: ignore
  omitted_files: ignore

exclude_docs: |
  AGENTS.md
  README.md
  AUTHORING-diagrams.md
  _snippets/

theme:
  name: material
  custom_dir: material-overrides
  favicon: assets/images/polkadot.png
  logo: assets/images/polkadot.png
  font: false # DM Sans is self-hosted (assets/stylesheets/fonts.css); no Google Fonts CDN.
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.path
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - search.suggest
    - search.highlight
  # Dark scheme is the default; the toggle lets readers switch to light. The
  # first entry is what loads first, so polkadot-dark leads. (No prefers-color-
  # scheme media queries — the docs open dark for everyone, matching the new
  # black-and-white-forward identity with per-chain diagram colour.)
  palette:
    - scheme: polkadot-dark
      toggle:
        icon: octicons/sun-24
        name: Switch to light mode
    - scheme: polkadot-light
      toggle:
        icon: octicons/moon-24
        name: Switch to dark mode

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - tables
  - toc:
      title: On this page
      permalink: false
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  # Single-source blocks live in docs/_snippets/ and are pulled in with `--8<--`.
  # Facts that appear on more than one page belong there, not in a second copy.
  - pymdownx.snippets:
      base_path:
        - docs/_snippets
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

extra:
  # No `social:` block on purpose. The header already carries a GitHub link (to
  # this repo, via repo_url); a second one in the footer pointing at a different
  # org is noise. Source links for individual projects live in
  # docs/reference/resources.md.
  generator: false

nav:
  - Home: index.md
  # "Get started" blends the platform introduction with the developer quickstart
  # as two pages under one section (clicking the tab lands on the Introduction).
  # introduction.md must appear ONCE in the nav — listing it here AND as a
  # top-level tab put it in the sidebar twice. The "For users" getting-started
  # page is hidden for now — it still builds (reachable by direct URL) but is out
  # of the nav.
  - Get started:
      - Introduction: introduction.md
      - Developer quickstart: getting-started/developers.md
  - Guides:
      - guides/index.md
      - For users:
          - Create an account & get funds: guides/create-account.md
          - Get & use CASH: guides/get-and-use-cash.md
          - Messaging & calls: guides/messaging-and-calls.md
          - Username & proof of personhood: guides/username-and-personhood.md
          - Discover & open apps: guides/discover-and-open-apps.md
      - For developers:
          - Build & Publish Applications: guides/build-and-publish.md
          - Register a .dot domain: guides/register-a-dot-name.md
          - Deploy & register contracts: guides/deploy-contracts-cdm.md
          - Use platform services from the SDK: guides/platform-services-sdk.md
          - List your app in Browse: guides/list-in-browse.md
  - Architecture:
      - architecture/index.md
      - The network: architecture/network.md
      - The Polkadot app (client tier): architecture/client.md
      - Naming (DotNS): architecture/naming.md
      - App delivery: architecture/app-delivery.md
      - Smart contracts & CDM: architecture/contracts.md
      - Identity & personhood: architecture/identity.md
      - Money (CASH & funding): architecture/money.md
      - App discovery (Browse): architecture/discovery.md
      - Messaging & calls: architecture/messaging.md
  - Reference:
      - reference/index.md
      - Networks & endpoints: reference/networks.md
      - Packages & tools: reference/packages.md
      - Addresses & registries: reference/addresses.md
      - Glossary: reference/glossary.md
      - More resources: reference/resources.md
